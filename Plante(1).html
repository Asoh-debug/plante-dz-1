<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plante-dz </title>
    <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="style.css">
     <script src="brain.js" defer></script>
   
    
</head>
<body class="bg-wikiBg text-wikiText font-sans min-h-screen">

    <header class="bg-white border-b border-wikiBorder px-6 py-4 shadow-sm mb-6 flex justify-between items-center">
        <h1 class="text-3xl font-serif text-natureGreen">Plante-dz Wiki 🇩🇿</h1>
        <p class="text-sm text-gray-500 italic hidden md:block">The free encyclopedia of Algerian botanical life.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-1">
            <div class="bg-white border border-wikiBorder p-5 shadow-sm sticky top-6">
                <div class="border-b border-wikiBorder pb-2 mb-4">
                    <h2 class="text-xl font-serif">Contribute an Article</h2>
                </div>
                
                <form id="flora-form" class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-bold mb-1">Plant Name</label>
                        <input type="text" id="name" required placeholder="e.g., Artemisia herba-alba" 
                            class="w-full border border-gray-300 px-3 py-2 focus:outline-none focus:border-natureGreen focus:ring-1 focus:ring-natureGreen rounded-sm">
                    </div>

                    <div>
                        <label for="category" class="block text-sm font-bold mb-1">Category</label>
                        <select id="category" required 
                            class="w-full border border-gray-300 px-3 py-2 focus:outline-none focus:border-natureGreen focus:ring-1 focus:ring-natureGreen rounded-sm bg-white">
                            <option value="" disabled selected>Select a category...</option>
                            <option value="Medical">Medical</option>
                            <option value="Nutritive">Nutritive</option>
                            <option value="Aromatic">Aromatic</option>
                        </select>
                    </div>

                   <div>
    <label for="image" class="block text-sm font-bold mb-1">Upload Plant Image</label>
    <input type="file" id="image" accept="image/*" required 
        class="w-full border border-gray-300 px-3 py-2 focus:outline-none focus:border-natureGreen focus:ring-1 focus:ring-natureGreen rounded-sm bg-white file:mr-4 file:py-1 file:px-3 file:border-0 file:bg-natureGreen file:text-white hover:file:bg-natureGreenHover cursor-pointer">
</div>
                    <div>
                        <label for="description" class="block text-sm font-bold mb-1">Description</label>
                        <p class="text-xs text-gray-500 mb-1">Explain the plant's relation to its category,where it is cultivate in Algeria or in the north Africa</p>
                        <textarea id="description" required rows="4" placeholder="Briefly describe its properties..."
                            class="w-full border border-gray-300 px-3 py-2 focus:outline-none focus:border-natureGreen focus:ring-1 focus:ring-natureGreen rounded-sm"></textarea>
                    </div>

                    <button type="submit" 
                        class="w-full bg-natureGreen text-white font-bold py-2 px-4 rounded-sm hover:bg-natureGreenHover transition-colors">
                        Share Article
                    </button>
                </form>
            </div>
        </section>

        <section class="lg:col-span-2">
            <div class="border-b border-wikiBorder pb-2 mb-6">
                <h2 class="text-2xl font-serif">Discovery Feed</h2>
            </div>
            
            <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>

            <div id="empty-state" class="hidden text-center py-12 text-gray-500">
                <p>No articles found. Be the first to contribute!</p>
            </div>
        </section>
    </main>

</body>
</html>
